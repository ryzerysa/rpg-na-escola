<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>RPG Canvas Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; }
        #hud { position: absolute; top: 10px; left: 10px; color: white; }
        .bar-container { width: 200px; height: 20px; background: #333; margin: 5px 0; position: relative; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.1s; }
        #hp-fill { background: red; }
        #xp-fill { background: green; }
        .bar-text { position: absolute; width: 100%; text-align: center; top: 0; left: 0; font-size: 12px; line-height: 20px; }
        #time-indicator { position: absolute; top: 10px; right: 10px; color: white; font-weight: bold; }
        #charge-bar-container { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); width: 150px; height: 10px; background: #222; display: none; }
        #charge-bar-fill { height: 100%; width: 0%; background: orange; }
        #death-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: red; font-size: 48px; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.5s; }
        #death-screen.active { opacity: 1; }
        #torch-overlay { display: none; }
        .cd-overlay { position: absolute; background: rgba(0,0,0,0.5); width: 100%; height: 0%; bottom: 0; }
    </style>
</head>
<body>
    <div id="hud">
        <div id="hud-level">VIGOR NÍVEL: 1</div>
        <div class="bar-container">
            <div id="hp-fill" class="bar-fill"></div>
            <div id="hp-text" class="bar-text">100 / 100</div>
        </div>
        <div class="bar-container">
            <div id="xp-fill" class="bar-fill"></div>
            <div id="xp-text" class="bar-text">0 / 100</div>
        </div>
    </div>
    <div id="time-indicator">TEMPO: DIA</div>
    <div id="charge-bar-container"><div id="charge-bar-fill"></div></div>
    <div id="death-screen">VOCÊ MORREU</div>
    <div id="torch-overlay"></div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- VARIÁVEIS GLOBAIS DE CONFIGURAÇÃO ---
        const WORLD_SIZE = 3000;
        const TILE_SIZE = 64;
        const DAY_DURATION = 1800; 
        const TOTAL_CYCLE = 3600;
        const MAX_MONSTERS = 20;
        let gameRunning = true;
        let isDead = false;
        let isHost = true; 
        let gameTime = 0;
        let mouseY = 0, mouseX = 0;
        let isQPressed = false;
        let chargeTimer = 0;
        let keys = {};
        let conn = null; 

        // Listas globais
        let projectiles = [];
        let monsters = [];
        let remotePlayers = {};
        let visualSlashes = [];
        let visualExplosions = [];

        // Estrutura do jogador local
        let player = {
            id: "local_player", x: WORLD_SIZE/2, y: WORLD_SIZE/2, size: 20, speed: 4,
            class: 'Mago', weaponMode: 'cajado', hp: 100, maxHp: 100, xp: 0, nextLevelXp: 100, level: 1, points: 0,
            stats: { int: 10, agi: 5, forca: 5 }, cooldowns: { '1': 0, '2': 0, '3': 0, 'Space': 0 },
            isRolling: false, rollTimer: 0, backdashMode: false, bleedTimer: 0, freezeTimer: 0, bleedDamage: 0,
            isInvisible: false, invisibleTimer: 0, hasTorchActive: false, angle: 0, attackCooldown: 0 // Altere hasTorchActive para testar a tocha
        };

        // --- CARREGAMENTO DE SPRITES ---
        const SPRITES = {
            guerreiro: new Image(),
            mago: new Image(),
            ladino: new Image(),
            ranged: new Image(),
            golemWalk: [new Image(), new Image(), new Image(), new Image()],
            monstroOlho: new Image(),
            bolaDeFogo: new Image() 
        };

        SPRITES.guerreiro.src = 'guerreiro.png';
        SPRITES.mago.src = 'mago.png';
        SPRITES.ladino.src = 'ladino.png';
        SPRITES.ranged.src = 'ranged.png';
        SPRITES.golemWalk[0].src = 'golem1.png';
        SPRITES.golemWalk[1].src = 'golem2.png';
        SPRITES.golemWalk[2].src = 'golem3.png';
        SPRITES.golemWalk[3].src = 'golem4.png';
        SPRITES.monstroOlho.src = 'olho.png';
        SPRITES.bolaDeFogo.src = 'bola de fogo.png'; 

        // --- FUNÇÕES AUXILIARES DE CRIAÇÃO ---
        function createGolemMonster() {
            return {
                x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE,
                type: 'golem', size: 30, speed: 1.5, hp: 50, maxHp: 50, damage: 10, xpValue: 25,
                bleedTimer: 0, bleedDamage: 0, freezeTimer: 0, animFrame: 0, animTimer: 0, angle: 0, iceInstances: {}
            };
        }

        function createOlhoMonster() {
            return {
                x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE,
                type: 'olho',
                size: player.size * 2, 
                speed: 2.5, hp: 35, maxHp: 35, damage: 15, xpValue: 30,
                bleedTimer: 0, bleedDamage: 0, freezeTimer: 0, animFrame: 0, animTimer: 0, angle: 0, iceInstances: {}
            };
        }

        function updateStatsUI() {}

        // --- LÓGICA DE HABILIDADES ---
        function triggerMagoExplosive() {
            if (player.hasTorchActive) return; // MODIFICAÇÃO: Impede uso com tocha na mão
            player.cooldowns[1] = 480; 
            let angle = Math.atan2(mouseY - canvas.height/2, mouseX - canvas.width/2);
            projectiles.push({
                x: player.x, y: player.y, startX: player.x, startY: player.y, ownerId: player.id,
                vx: Math.cos(angle) * 7, vy: Math.sin(angle) * 7,
                size: 18, isFireball: true, isBlue: false, isRedExplosive: true,
                maxRange: 7 * TILE_SIZE, damage: 55 + (player.stats.int * 7)
            });
            isQPressed = false; 
        }

        function triggerMagoGelo() {
            if (player.hasTorchActive) return; // MODIFICAÇÃO: Impede uso com tocha na mão
            player.cooldowns[2] = 300; 
            let baseAngle = Math.atan2(mouseY - canvas.height/2, mouseX - canvas.width/2);
            let iceCastId = Math.random().toString(); 
            let iceDmg = 12 + (player.stats.int * 1.5);

            let offsets = [-0.2, 0, 0.2];
            offsets.forEach(offset => {
                let finalAngle = baseAngle + offset;
                projectiles.push({
                    x: player.x, y: player.y, startX: player.x, startY: player.y, ownerId: player.id,
                    vx: Math.cos(finalAngle) * 9, vy: Math.sin(finalAngle) * 9,
                    size: 6, isFireball: false, isArrow: false, isIce: true, iceId: iceCastId,
                    maxRange: 11 * TILE_SIZE, damage: iceDmg
                });
            });
        }

        function triggerLadinoSombras() {
            if (player.hasTorchActive) return; // MODIFICAÇÃO: Impede uso com tocha na mão
            player.cooldowns[1] = 240; 
            player.isInvisible = true;
            player.invisibleTimer = 360; 
            isQPressed = false;
        }

        function triggerLadinoBleedStrike() {
            if (player.hasTorchActive) return; // MODIFICAÇÃO: Impede uso com tocha na mão
            if (player.cooldowns[3] > 0) return;
            player.cooldowns[3] = 360; 
            
            let angle = Math.atan2(mouseY - canvas.height/2, mouseX - canvas.width/2);
            let range = 70;
            let instantDmg = 12 + (player.stats.agi * 2);
            let tickDmg = 6 + (player.stats.forca * 0.8);

            visualSlashes.push({ x: player.x, y: player.y, angle: angle, duration: 12, isBleed: true });
            if(conn && conn.open) conn.send({type: 'meleeSlash', x: player.x, y: player.y, angle: angle});

            Object.keys(remotePlayers).forEach(pId => {
                let rm = remotePlayers[pId];
                if(!rm || !rm.class) return;
                if(rm.hp > 0 && Math.hypot(rm.x - player.x, rm.y - player.y) <= range + 24) {
                    if(conn && conn.open) {
                        conn.send({type: 'inflictDamage', targetId: pId, damage: instantDmg});
                        conn.send({type: 'applyBleed', targetId: pId, duration: 300, baseDamage: tickDmg});
                    }
                }
            });

            if (isHost) {
                monsters.forEach(m => {
                    if (Math.hypot(m.x - player.x, m.y - player.y) <= range + m.size) {
                        m.hp -= instantDmg; m.bleedTimer = 300; m.bleedDamage = tickDmg;
                    }
                });
            }
        }

        function fireRangedArrow() {
            if (player.hasTorchActive) return; // MODIFICAÇÃO: Impede uso com tocha na mão
            player.cooldowns[1] = 140; 
            let angle = Math.atan2(mouseY - canvas.height/2, mouseX - canvas.width/2);
            let pct = Math.min(chargeTimer / 300, 1.0); 
            projectiles.push({
                x: player.x, y: player.y, startX: player.x, startY: player.y, ownerId: player.id,
                vx: Math.cos(angle) * (9 + pct * 6), vy: Math.sin(angle) * (9 + pct * 6),
                size: 5 + (pct * 9), isFireball: false, isArrow: true, isSuperArrow: true,
                maxRange: (4 + (pct * 12)) * TILE_SIZE, damage: 20 + (pct * 80) + (player.stats.agi * 5)
            });
        }

        function triggerRemoteSlash(data) { visualSlashes.push({ x: data.x, y: data.y, angle: data.angle, duration: 10, isBleed: false }); }
        function triggerVisualExplosion(data) { visualExplosions.push({ x: data.x, y: data.y, radius: data.radius, alpha: 1.0 }); }

        function triggerSkill(skill) {
            if (!gameRunning || player.cooldowns[skill] > 0 || isDead) return;
            if (player.hasTorchActive) return; // MODIFICAÇÃO: Impede ativação de esquiva/dash com a tocha ativa
            if (skill === 'Space') { player.cooldowns[skill] = 90; player.isRolling = true; player.rollTimer = 18; player.backdashMode = false; }
        }

        function handlePlayerDeath() {
            isDead = true; isQPressed = false; chargeTimer = 0; player.backdashMode = false;
            player.bleedTimer = 0; player.freezeTimer = 0; player.hasTorchActive = false;
            document.getElementById('torch-overlay').style.display = 'none';
            document.getElementById('charge-bar-container').style.display = 'none';
            let screen = document.getElementById('death-screen');
            screen.style.display = 'flex';
            setTimeout(() => { screen.classList.add('active'); }, 50);
            setTimeout(() => {
                player.hp = player.maxHp; player.x = WORLD_SIZE / 2; player.y = WORLD_SIZE / 2;
                isDead = false; screen.classList.remove('active');
                setTimeout(() => { screen.style.display = 'none'; }, 500);
            }, 3000);
        }

        function explodeFireball(p) {
            let radius = 80; 
            visualExplosions.push({ x: p.x, y: p.y, radius: radius, alpha: 1.0 });
            if(conn && conn.open) conn.send({type: 'explosion', x: p.x, y: p.y, radius: radius});

            Object.keys(remotePlayers).forEach(pId => {
                let rm = remotePlayers[pId];
                if(!rm || !rm.class) return;
                if(rm.hp > 0 && Math.hypot(rm.x - p.x, rm.y - p.y) <= radius) {
                    if(conn && conn.open) conn.send({type: 'inflictDamage', targetId: pId, damage: p.damage});
                }
            });

            if (isHost) {
                monsters.forEach(m => {
                    if (Math.hypot(m.x - p.x, m.y - p.y) <= radius) {
                        m.hp -= p.damage; if (m.hp <= 0) player.xp += m.xpValue;
                    }
                });
            }
        }

        // --- GAME LOOP UPDATE ---
        function update() {
            if(!gameRunning || isDead) return;
            if(player.hp <= 0) { handlePlayerDeath(); return; }

            if (player.bleedTimer > 0) {
                player.bleedTimer--;
                if (player.bleedTimer % 60 === 0) {
                    let vidaPerdidaPct = 1 - (player.hp / player.maxHp); 
                    let multiplicadorDesespero = 1 + (vidaPerdidaPct * 2.5); 
                    player.hp -= player.bleedDamage * multiplicadorDesespero;
                }
            }

            if (player.freezeTimer > 0) player.freezeTimer--;

            if (isHost) {
                gameTime = (gameTime + 1) % TOTAL_CYCLE;
                if(conn && conn.open) {
                    conn.send({ type: 'timeSync', time: gameTime });
                }
            }

            let isNight = gameTime >= DAY_DURATION;
            document.getElementById('time-indicator').innerText = isNight ? "TEMPO: NOITE" : "TEMPO: DIA";

            player.angle = Math.atan2(mouseY - canvas.height/2, mouseX - canvas.width/2);
            if (player.attackCooldown > 0) player.attackCooldown--;

            // MODIFICAÇÃO: Só carrega ataque se não estiver segurando a tocha
            if(isQPressed && player.class === 'Ranged' && player.weaponMode === 'arco' && player.cooldowns[1] <= 0 && !player.hasTorchActive) {
                if(chargeTimer < 300) chargeTimer++; 
                document.getElementById('charge-bar-container').style.display = 'block';
                document.getElementById('charge-bar-fill').style.width = `${(chargeTimer / 300) * 100}%`;
            }

            let currentSpeed = player.freezeTimer > 0 ? 0 : player.speed;
            let moveX = 0, moveY = 0;

            if (player.isRolling && player.freezeTimer <= 0) {
                if (player.backdashMode) {
                    moveX = -Math.cos(player.angle); moveY = -Math.sin(player.angle);
                    currentSpeed *= 2.2; 
                } else {
                    if (keys['w'] || keys['arrowup']) moveY -= 1;
                    if (keys['s'] || keys['arrowdown']) moveY += 1;
                    if (keys['a'] || keys['arrowleft']) moveX -= 1;
                    if (keys['d'] || keys['arrowright']) moveX += 1;
                    if (moveX === 0 && moveY === 0) { moveX = Math.cos(player.angle); moveY = Math.sin(player.angle); }
                    currentSpeed *= 1.8;
                }
                player.rollTimer--;
                if(player.rollTimer <= 0) { player.isRolling = false; player.backdashMode = false; }
            } else if (player.freezeTimer <= 0) {
                if (keys['w'] || keys['arrowup']) moveY -= 1;
                if (keys['s'] || keys['arrowdown']) moveY += 1;
                if (keys['a'] || keys['arrowleft']) moveX -= 1;
                if (keys['d'] || keys['arrowright']) moveX += 1;
            }
            
            if (moveX !== 0 && moveY !== 0 && !player.backdashMode) { moveX *= 0.707; moveY *= 0.707; }
            
            player.x = Math.max(0, Math.min(WORLD_SIZE, player.x + moveX * currentSpeed));
            player.y = Math.max(0, Math.min(WORLD_SIZE, player.y + moveY * currentSpeed));

            if(player.isInvisible) { player.invisibleTimer--; if(player.invisibleTimer <= 0) player.isInvisible = false; }

            for(let i = visualSlashes.length - 1; i >= 0; i--) { visualSlashes[i].duration--; if(visualSlashes[i].duration <= 0) visualSlashes.splice(i, 1); }
            for(let i = visualExplosions.length - 1; i >= 0; i--) { visualExplosions[i].alpha -= 0.04; if(visualExplosions[i].alpha <= 0) visualExplosions.splice(i, 1); }
            
            for (let k in player.cooldowns) { 
                if (player.cooldowns[k] > 0) { 
                    player.cooldowns[k]--; 
                    let maxCd = 90;
                    if(k === '1') {
                        if (player.class === 'Mago') maxCd = 480;
                        else if (player.class === 'Ladino') maxCd = 240;
                        else if (player.class === 'Ranged') maxCd = player.weaponMode === 'arco' ? 140 : 160;
                    }
                    if(k === '2') {
                        if (player.class === 'Mago') maxCd = 300;
                    }
                    if(k === '3') maxCd = 360;
                    let overlay = document.getElementById(`cd-${k}`);
                    if(overlay) overlay.style.height = (player.cooldowns[k] / maxCd) * 100 + '%'; 
                } 
            }

            for(let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i]; p.x += p.vx; p.y += p.vy;
                let distTraveled = Math.hypot(p.x - p.startX, p.y - p.startY);
                let hitSomething = false;

                Object.keys(remotePlayers).forEach(pId => {
                    let rm = remotePlayers[pId];
                    if(!rm || !rm.class) return;
                    if(p.ownerId !== pId && rm.hp > 0 && Math.hypot(rm.x - p.x, rm.y - p.y) < 24 + p.size) {
                        hitSomething = true;
                        if(!p.isRedExplosive && conn && conn.open) {
                            conn.send({type: 'inflictDamage', targetId: pId, damage: p.damage});
                            if (p.isIce) {
                                conn.send({type: 'applyFreeze', targetId: pId, duration: 150}); 
                            }
                        }
                    }
                });

                if (isHost) {
                    monsters.forEach(m => {
                        if(Math.hypot(m.x - p.x, m.y - p.y) < m.size + p.size) {
                            hitSomething = true;
                            if(!p.isRedExplosive) m.hp -= p.damage; 
                            
                            if (p.isIce) {
                                if (!m.iceInstances[p.iceId]) m.iceInstances[p.iceId] = 0;
                                m.iceInstances[p.iceId]++;
                                
                                if (m.iceInstances[p.iceId] >= 3) {
                                    m.freezeTimer = 150; 
                                }
                            }
                        }
                    });
                }
                if(distTraveled >= p.maxRange || hitSomething) {
                    if(p.isRedExplosive) explodeFireball(p);
                    projectiles.splice(i, 1); continue;
                }
            }

            if(isHost) {
                let isNight = gameTime >= DAY_DURATION;

                monsters.forEach(m => {
                    if (m.bleedTimer > 0) {
                        m.bleedTimer--;
                        if (m.bleedTimer % 60 === 0) {
                            let mLifePct = 1 - (m.hp / m.maxHp);
                            let monsterBleedMult = 1 + (mLifePct * 2.5);
                            m.hp -= m.bleedDamage * monsterBleedMult;
                        }
                    }

                    if (m.freezeTimer > 0) m.freezeTimer--;

                    let targets = [player, ...Object.values(remotePlayers)].filter(t => t && t.class && !t.isInvisible && t.hp > 0);
                    if(targets.length === 0) {
                        m.animTimer++; if(m.animTimer > 12) { m.animFrame = (m.animFrame + 1) % 4; m.animTimer = 0; }
                        return; 
                    }
                    
                    let closest = targets[0];
                    let minDist = Math.hypot(closest.x - m.x, closest.y - m.y);
                    m.angle = Math.atan2(closest.y - m.y, closest.x - m.x);

                    if(minDist < 600 && m.freezeTimer <= 0) { 
                        m.x += Math.cos(m.angle) * m.speed; m.y += Math.sin(m.angle) * m.speed; 
                        if(minDist < m.size + closest.size) {
                            if(closest.id === player.id) {
                                if(!player.isRolling) player.hp -= m.damage;
                            } else if(conn && conn.open) {
                                conn.send({type: 'inflictDamage', targetId: closest.id, damage: m.damage});
                            }
                        }
                    }
                    m.animTimer++; if(m.animTimer > 12) { m.animFrame = (m.animFrame + 1) % 4; m.animTimer = 0; }
                });
                
                monsters = monsters.filter(m => m.hp > 0);
                
                if(monsters.length < MAX_MONSTERS && Math.random() < 0.005) {
                    if (isNight) {
                        if (Math.random() < 0.5) {
                            monsters.push(createOlhoMonster());
                        } else {
                            monsters.push(createGolemMonster());
                        }
                    } else {
                        monsters.push(createGolemMonster());
                    }
                }
            }

            if (player.xp >= player.nextLevelXp) {
                player.level++; player.points++; player.xp -= player.nextLevelXp;
                player.nextLevelXp = Math.floor(player.nextLevelXp * 1.6); player.maxHp += 15; player.hp = player.maxHp;
                updateStatsUI();
            }

            if(conn && conn.open) {
                conn.send({ type: 'playerUpdate', id: player.id, state: { x: player.x, y: player.y, angle: player.angle, class: player.class, hp: player.hp, isInvisible: player.isInvisible, hasTorchActive: player.hasTorchActive } });
            }

            document.getElementById('hud-level').innerText = `VIGOR NÍVEL: ${player.level}`;
            document.getElementById('hp-fill').style.width = `${Math.max(0, (player.hp / player.maxHp) * 100)}%`;
            document.getElementById('hp-text').innerText = `${Math.floor(Math.max(0, player.hp))} / ${player.maxHp}`;
            document.getElementById('xp-fill').style.width = `${(player.xp / player.nextLevelXp) * 100}%`;
            document.getElementById('xp-text').innerText = `${player.xp} / ${player.nextLevelXp}`;
        }

        // --- RENDER GAME CANVAS ---
        function render() {
            if(!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let camX = canvas.width / 2 - player.x; let camY = canvas.height / 2 - player.y;

            let isNight = gameTime >= DAY_DURATION;
            ctx.fillStyle = isNight ? '#030305' : '#141416'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save(); ctx.translate(camX, camY);
            ctx.strokeStyle = isNight ? 'rgba(255,255,255,0.015)' : 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
            for(let i=0; i<WORLD_SIZE; i+=64) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, WORLD_SIZE); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(WORLD_SIZE, i); ctx.stroke();
            }
            ctx.restore();

            visualExplosions.forEach(e => {
                ctx.save(); ctx.translate(e.x + camX, e.y + camY);
                let gradient = ctx.createRadialGradient(0, 0, 5, 0, 0, e.radius);
                gradient.addColorStop(0, `rgba(230, 90, 90, ${e.alpha})`);
                gradient.addColorStop(0.4, `rgba(100, 10, 0, ${e.alpha * 0.8})`);
                gradient.addColorStop(1, `rgba(20, 0, 0, 0)`);
                ctx.fillStyle = gradient; ctx.beginPath(); ctx.arc(0, 0, e.radius, 0, Math.PI*2); ctx.fill(); ctx.restore();
            });

            visualSlashes.forEach(s => {
                ctx.save(); ctx.translate(s.x + camX, s.y + camY); ctx.rotate(s.angle);
                ctx.strokeStyle = s.isBleed ? 'rgba(140, 15, 15, 0.85)' : 'rgba(120, 125, 135, 0.4)'; 
                ctx.lineWidth = s.isBleed ? 4 : 2;
                ctx.beginPath(); ctx.arc(0, 0, 45, -0.6, 0.6); ctx.stroke(); ctx.restore();
            });

            projectiles.forEach(p => {
                ctx.save(); ctx.translate(p.x + camX, p.y + camY); ctx.rotate(Math.atan2(p.vy, p.vx));
                
                if(p.isFireball) {
                    if (SPRITES.bolaDeFogo.complete) {
                        ctx.drawImage(SPRITES.bolaDeFogo, -p.size, -p.size, p.size * 2, p.size * 2);
                    } else {
                        let gradient = ctx.createRadialGradient(0, 0, 2, 0, 0, p.size);
                        gradient.addColorStop(0, '#ffdfbf'); gradient.addColorStop(0.4, '#8a1c00'); gradient.addColorStop(1, 'rgba(30, 0, 0, 0)');
                        ctx.fillStyle = gradient; ctx.beginPath(); ctx.arc(0, 0, p.size, 0, Math.PI*2); ctx.fill();
                    }
                } else if(p.isArrow) {
                    ctx.strokeStyle = p.isSuperArrow ? '#145c28' : '#6b5a40'; 
                    ctx.lineWidth = p.size / 2; ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(15, 0); ctx.stroke();
                } else if(p.isIce) {
                    ctx.fillStyle = 'rgba(140, 220, 255, 0.8)';
                    ctx.strokeStyle = '#2bb3ff';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(14, 0);
                    ctx.lineTo(-8, -4);
                    ctx.lineTo(-12, 0);
                    ctx.lineTo(-8, 4);
                    ctx.closePath();
                    ctx.fill(); ctx.stroke();
                }
                ctx.restore();
            });

            monsters.forEach(m => {
                ctx.save(); ctx.translate(m.x + camX, m.y + camY); ctx.rotate(m.angle + Math.PI/2);
                
                if (m.bleedTimer > 0 && Math.floor(m.bleedTimer / 4) % 2 === 0) {
                    ctx.filter = 'contrast(1.5) brightness(0.3) sepia(1) hue-rotate(-50deg)';
                } else if (m.freezeTimer > 0) {
                    ctx.filter = 'hue-rotate(30deg) saturate(1.8) brightness(0.8) sepia(0.3)'; 
                } else {
                    ctx.filter = isNight ? 'contrast(1.3) brightness(0.2) grayscale(0.3)' : 'contrast(1.1) brightness(0.45)';
                }

                if (m.type === 'golem') {
                    let frameImg = SPRITES.golemWalk[m.animFrame];
                    if (frameImg.complete) {
                        ctx.drawImage(frameImg, -m.size, -m.size, m.size*2, m.size*2);
                    }
                } else if (m.type === 'olho') {
                    if (SPRITES.monstroOlho.complete) {
                        ctx.rotate(-Math.PI/2); 
                        ctx.drawImage(SPRITES.monstroOlho, -m.size, -m.size, m.size*2, m.size*2);
                    }
                }
                
                ctx.filter = 'none'; 
                ctx.restore();
                
                if (m.freezeTimer > 0) {
                    ctx.fillStyle = 'rgba(100, 200, 255, 0.4)';
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
                    ctx.lineWidth = 1;
                    ctx.fillRect(m.x + camX - m.size - 2, m.y + camY - m.size - 2, m.size * 2 + 4, m.size * 2 + 4);
                    ctx.strokeRect(m.x + camX - m.size - 2, m.y + camY - m.size - 2, m.size * 2 + 4, m.size * 2 + 4);
                }

                ctx.fillStyle = '#0d0a0a'; ctx.fillRect(m.x + camX - m.size, m.y + camY - m.size - 8, m.size * 2, 3);
                ctx.fillStyle = m.bleedTimer > 0 ? '#7a0000' : '#3d1212'; 
                ctx.fillRect(m.x + camX - m.size, m.y + camY - m.size - 8, (m.hp / m.maxHp) * (m.size * 2), 3);
            });

            Object.values(remotePlayers).forEach(np => {
                if(!np || !np.class || np.isInvisible || np.hp <= 0) return;
                ctx.save(); ctx.translate(np.x + camX, np.y + camY); ctx.rotate(np.angle);
                let img = SPRITES[np.class.toLowerCase()] || SPRITES.guerreiro;
                if(img.complete) {
                    ctx.filter = isNight ? 'brightness(0.25)' : 'brightness(0.55)'; 
                    ctx.drawImage(img, -20, -20, 40, 40); ctx.filter = 'none';
                }
                ctx.restore();

                ctx.fillStyle = '#0d0a0a'; ctx.fillRect(np.x + camX - 20, np.y + camY - 28, 40, 3);
                ctx.fillStyle = '#9c1c1c'; ctx.fillRect(np.x + camX - 20, np.y + camY - 28, Math.max(0, (np.hp / 100)) * 40, 3);
            });

            if(!isDead) {
                ctx.save(); ctx.translate(canvas.width / 2, canvas.height / 2); ctx.rotate(player.angle);
                if(player.isInvisible) ctx.globalAlpha = 0.15;
                if(player.isRolling) ctx.globalAlpha = 0.35;
                let pImg = SPRITES[player.class.toLowerCase()] || SPRITES.guerreiro;
                if (pImg.complete) {
                    if (player.freezeTimer > 0) {
                        ctx.filter = 'hue-rotate(30deg) saturate(2) brightness(0.7)';
                    } else {
                        ctx.filter = isNight ? 'brightness(0.3)' : 'brightness(0.65)'; 
                    }
                    ctx.drawImage(pImg, -player.size, -player.size, player.size*2, player.size*2); ctx.filter = 'none';
                }
                ctx.restore();

                if (player.freezeTimer > 0) {
                    ctx.fillStyle = 'rgba(70, 160, 240, 0.3)';
                    ctx.fillRect(canvas.width/2 - player.size, canvas.height/2 - player.size, player.size*2, player.size*2);
                }

                if(player.bleedTimer > 0 && Math.floor(player.bleedTimer / 6) % 2 === 0) {
                    ctx.fillStyle = 'rgba(150, 0, 0, 0.15)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
            }

            if (isNight) {
                ctx.save();
                
                // MODIFICAÇÃO: Se a tocha estiver ativa, expande o tamanho do raio da visão padrão de forma limpa (sem filtros de cor)
                let lightRadius = player.isInvisible ? 95 : 175;
                if (player.hasTorchActive && !player.isInvisible) {
                    lightRadius = 340; 
                }

                let gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, lightRadius * 0.1, canvas.width/2, canvas.height/2, lightRadius);
                
                // Ambas as opções agora utilizam sombras pretas puras de forma idêntica, alterando apenas a distância alcançada
                gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
                gradient.addColorStop(0.5, 'rgba(0, 0, 2, 0.65)');
                gradient.addColorStop(1, 'rgba(0, 0, 1, 0.99)'); 
                
                ctx.fillStyle = gradient; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();
            }
        }

        function gameLoop() {
            update(); render();
            window.requestAnimationFrame(gameLoop);
        }

        // --- GESTÃO DE INPUTS BÁSICOS ---
        window.addEventListener('keydown', e => { 
            keys[e.key.toLowerCase()] = true; 
            if(e.key === ' ') triggerSkill('Space'); 
            if(e.key.toLowerCase() === 'q') isQPressed = true; 
        });
        
        window.addEventListener('keyup', e => { 
            keys[e.key.toLowerCase()] = false; 
            if(e.key.toLowerCase() === 'q') { 
                if (player.hasTorchActive) { isQPressed = false; return; } // MODIFICAÇÃO: Impede disparar habilidades ao soltar o Q se estiver de tocha
                if(player.class === 'Mago') triggerMagoExplosive(); 
                else if(player.class === 'Ranged') fireRangedArrow(); 
            } 
        });
        
        window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        gameLoop();
    </script>
</body>
</html>
